kind: Agent
name: osv
version: 0.8.9
description: |
  This repository is an implementation of [Ostorlab Agent](https://pypi.org/project/ostorlab/) for the [OSV Scanner](https://github.com/google/osv-scanner).
license: Apache-2.0
in_selectors:
  - v3.asset.file
  - v3.fingerprint.file
  - v3.asset.link
  - v3.asset.repository
  - v3.asset.file.repository_archive
out_selectors:
  - v3.report.vulnerability
args:
  - name: "nvd_api_key"
    type: "string"
    description: "NVD api key."
  - name: "exclude_path_regexes"
    type: "array"
    description: "List of regex patterns; files whose path matches any pattern are skipped."
docker_file_path : Dockerfile
docker_build_root : .
volumes:
  - name: repository_code
    path: /code
    read_only: true
